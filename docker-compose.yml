name: rinha-backend-2026

# Both api replicas use the SAME image. Because Docker's overlayfs layers
# point to the same lower-layer inode for /data/references.bin on the host,
# the kernel page cache for that file is shared between containers — i.e.
# the dataset costs ~192 MB of RAM total, not per replica.

services:
  api1: &api
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: rinha-backend-2026-api:latest
    environment:
      PORT: "9999"
      DOTNET_GCHeapCount: "1"
      DOTNET_gcServer: "${DOTNET_GCSERVER:-0}"
      DOTNET_GCConserveMemory: "9"
      DOTNET_PROCESSOR_COUNT: "1"
      LIFO_LIMIT: "${LIFO_LIMIT:-0}"
      LIFO_QUEUE: "${LIFO_QUEUE:-32}"
      IVF_EARLY_MAJORITY: "${IVF_EARLY_MAJORITY:-0}"
      IVF_DEADLINE_US: "${IVF_DEADLINE_US:-0}"
      HARDQ_DUMP_PATH: "${HARDQ_DUMP_PATH:-}"
      HARDQ_DEADLINE_US: "${HARDQ_DEADLINE_US:-1500}"
      HARDQ_NPROBE_EASY: "${HARDQ_NPROBE_EASY:-0}"
      SCORER: "${SCORER:-ivf}"
      IVF_NPROBE: "${IVF_NPROBE:-96}"
      IVF_RERANK: "${IVF_RERANK:-64}"
      Q8_RERANK: "${Q8_RERANK:-32}"
      IVF_EARLY_STOP: "${IVF_EARLY_STOP:-1}"
      # J14: re-sweep with what-if instrumentation (PROFILE_TIMING=2) reveals plateau
      # at pct ∈ [70, 75], indistinguishable (Welch p=0.59). pct=72 picked as the centre.
      # n=5 results (today, σ_baseline≈40):
      #   pct=60: final 4874 (cauda explode, p99 +35%)
      #   pct=65: final 5024
      #   pct=70: final 5110 ← optimum numerical
      #   pct=75: final 5100 ← tie
      #   pct=78: final 5059 (previous default)
      #   pct=85: final 5068
      # What-if metrics show 95.8% of queries already gate-pass at pct=60 with mean-slack≈2.0,
      # but bench scoring is dominated by p99: pushing pct too low starves the 4.2% "hard"
      # queries of CPU under arrival-rate load → cauda piora.
      IVF_EARLY_STOP_PCT: "${IVF_EARLY_STOP_PCT:-72}"
      IVF_EARLY_STOP_PCT_EARLY: "${IVF_EARLY_STOP_PCT_EARLY:-0}"
      IVF_BBOX_REPAIR: "${IVF_BBOX_REPAIR:-0}"
      # Dormant toggles (rejected experiments, kept as 0 to preserve tested behavior).
      # IVF_SCALAR_ABORT: 0=baseline AVX2, 1=AoS dim-unroll (J10, neutral), 2=SoA (J11, -731pts)
      IVF_SCALAR_ABORT: "${IVF_SCALAR_ABORT:-0}"
      # IVF_DENSITY_ORDER: J12a — reorder visited cells by size desc; rejected (-52 noise).
      IVF_DENSITY_ORDER: "${IVF_DENSITY_ORDER:-0}"
      FAST_JSON: "${FAST_JSON:-0}"
      PROFILE_TIMING: "${PROFILE_TIMING:-0}"
      ALLOC_TRACE: "${ALLOC_TRACE:-0}"
    networks: [app]
    volumes:
      - ./tools/hq-data:/hq
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

  api2:
    <<: *api
    depends_on:
      - api1

  lb:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "50MB"

networks:
  app:
    driver: bridge
