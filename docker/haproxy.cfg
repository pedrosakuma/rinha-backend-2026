global
    nbthread 1
    maxconn 4096
    log stdout format raw local0 warning

defaults
    mode http
    timeout connect 2s
    timeout client  10s
    timeout server  10s
    option http-keep-alive
    option dontlognull

frontend fe
    bind *:9999
    default_backend be

backend be
    balance leastconn
    option http-keep-alive
    http-reuse always
    server api1 api1:9999 check inter 5s
    server api2 api2:9999 check inter 5s
