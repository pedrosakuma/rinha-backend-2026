worker_processes 1;
worker_rlimit_nofile 8192;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;
    server_tokens off;

    upstream api {
        least_conn;  # round-robin-ish; with 2 nodes both will receive equal load
        server api1:9999 max_fails=0;
        server api2:9999 max_fails=0;
        keepalive 64;
    }

    server {
        listen 9999 default_server reuseport backlog=4096;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 5s;
            proxy_send_timeout 5s;
            proxy_connect_timeout 1s;
        }
    }
}
