worker_processes 1;
worker_rlimit_nofile 8192;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    sendfile off;
    tcp_nopush off;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000000;
    server_tokens off;

    upstream api {
        least_conn;
        server unix:/run/uds/api1.sock max_fails=0;
        server unix:/run/uds/api2.sock max_fails=0;
        keepalive 256;
        keepalive_requests 1000000;
        keepalive_timeout 65s;
    }

    server {
        listen 9999 default_server reuseport backlog=8192;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 5s;
            proxy_send_timeout 5s;
            proxy_connect_timeout 1s;
        }
    }
}
